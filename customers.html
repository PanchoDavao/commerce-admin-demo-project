<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<script src="https://cdn.tailwindcss.com"></script>

<script src="assets/js/data.js"></script>
<script src="assets/js/customers.js"></script>
<script>
if(localStorage.getItem("isLoggedIn") !== "true"){
 window.location.href = "login.html";
}
</script>
<script>function logout(){
 localStorage.removeItem("isLoggedIn");
 localStorage.removeItem("role");
 window.location.href = "login.html";
}</script>
</head>

<body class="bg-gray-100">

<div class="w-full md:w-64 h-screen md:h-screen bg-gray-900 text-white p-6 fixed md:fixed top-0 left-0 z-10">

<h2 class="text-2xl font-bold mb-8">Admin Panel</h2>

<ul class="space-y-4">

<li>
<a href="dashboard.html" class="hover:text-blue-400">Dashboard</a>
</li>

<li>
<a href="products.html" class="hover:text-blue-400">Products</a>
</li>

<li>
<a href="orders.html" class="hover:text-blue-400">Orders</a>
</li>

<li>
<a href="customers.html" class="hover:text-blue-400">Customers</a>
</li>

</ul>

</div>

<div class="ml-0 md:ml-64 p-4 md:p-10">

<h1 class="text-3xl font-bold mb-6">Customers</h1>

<input
 id="searchCustomer"
 placeholder="Search customers by name, email, phone, address..."
 class="border p-2 mb-4 w-full"
 onkeyup="searchCustomers()">

<div class="bg-white p-4 rounded shadow mb-6">

<div class="flex flex-col md:flex-row md:flex-wrap">
<input id="customerName" placeholder="Customer Name" class="border p-2 mb-2 md:mb-0 md:mr-2">
<input id="customerEmail" placeholder="Email" class="border p-2 mb-2 md:mb-0 md:mr-2">
<input id="customerPhone" placeholder="Phone" class="border p-2 mb-2 md:mb-0 md:mr-2">
<input id="customerAddress" placeholder="Address" class="border p-2 mb-2 md:mb-0 md:mr-2">
</div>

<button onclick="addCustomer()" class="bg-blue-500 text-white px-4 py-2 rounded mt-2">
Add Customer
</button>

</div>

<div class="overflow-x-auto">
<table class="w-full bg-white shadow rounded">

<thead class="bg-gray-200">

<tr>
<th class="p-3">Name</th>
<th class="p-3">Email</th>
<th class="p-3">Phone</th>
<th class="p-3">Address</th>
<th class="p-3">Date Listed</th>
<th class="p-3">Action</th>
</tr>

</thead>

<tbody id="customerTable"></tbody>

</table>
</div>

</div>

</body>
</html>
