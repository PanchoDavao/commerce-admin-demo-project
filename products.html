<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<script src="https://cdn.tailwindcss.com"></script>

<script src="assets/js/data.js"></script>
<script src="assets/js/products.js"></script>
<script>
if(localStorage.getItem("isLoggedIn") !== "true"){
 window.location.href = "login.html";
}
</script>
<script>function logout(){
 localStorage.removeItem("isLoggedIn");
 localStorage.removeItem("role");
 window.location.href = "login.html";
}</script>
</head>

<body class="bg-gray-100">

<div class="w-full md:w-64 h-screen md:h-screen bg-gray-900 text-white p-6 fixed md:fixed top-0 left-0 z-10">

<h2 class="text-2xl font-bold mb-8">Admin Panel</h2>

<ul class="space-y-4">

<li>
<a href="dashboard.html" class="hover:text-blue-400">Dashboard</a>
</li>

<li>
<a href="products.html" class="hover:text-blue-400">Products</a>
</li>

<li>
<a href="orders.html" class="hover:text-blue-400">Orders</a>
</li>

<li>
<a href="customers.html" class="hover:text-blue-400">Customers</a>
</li>

</ul>

</div>


<div class="ml-0 md:ml-64 p-4 md:p-10">

<h2 class="text-xl font-bold mb-4">Add Product</h2>

<div class="bg-white p-4 rounded shadow mb-6">

<div class="flex flex-col md:flex-row md:flex-wrap">
<input id="name" placeholder="Product Name" class="border p-2 mb-2 md:mb-0 md:mr-2">
<input id="price" placeholder="Price" type="number" class="border p-2 mb-2 md:mb-0 md:mr-2">
<input id="stock" placeholder="Stock" type="number" class="border p-2 mb-2 md:mb-0 md:mr-2">
</div>

<button onclick="addProduct()" class="bg-blue-500 text-white px-4 py-2 rounded">
Add
</button>

</div>

<h1 class="text-3xl font-bold mb-6">Products</h1>

<input 
id="searchProduct" 
placeholder="Search product..." 
class="border p-2 mb-4 w-full"
onkeyup="searchProducts()">

<div class="overflow-x-auto">
<table class="w-full bg-white shadow rounded">

<thead class="bg-gray-200">
<tr>
<th class="p-3">Product</th>
<th class="p-3">Price</th>
<th class="p-3">Stock</th>
<th class="p-3">Actions</th>
</tr>
</thead>

<tbody id="productTable"></tbody>

</table>
</div>

</div>

<div id="transactionHistoryModal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center p-4">
 <div class="bg-white rounded-lg shadow-lg w-full max-w-3xl overflow-hidden">
  <div class="flex items-center justify-between p-4 border-b">
   <div>
    <h2 id="transactionHistoryTitle" class="text-xl font-bold"></h2>
    <p id="transactionHistoryStock" class="text-sm text-gray-600"></p>
   </div>
   <button onclick="closeHistoryModal()" class="text-gray-500 hover:text-gray-900">Close</button>
  </div>
  <div class="p-4">
   <table class="w-full text-left border rounded">
    <thead class="bg-gray-100">
     <tr>
      <th class="p-3">Date</th>
      <th class="p-3">Qty</th>
      <th class="p-3">Cause</th>
      <th class="p-3">Note</th>
     </tr>
    </thead>
    <tbody id="transactionHistoryBody"></tbody>
   </table>
  </div>
 </div>
</div>

</body>
</html>
