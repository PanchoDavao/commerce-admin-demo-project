<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<script src="https://cdn.tailwindcss.com"></script>

<script src="assets/js/data.js"></script>
<script src="assets/js/orders.js"></script>
<script>
if(localStorage.getItem("isLoggedIn") !== "true"){
 window.location.href = "login.html";
}
</script>
<script>function logout(){
 localStorage.removeItem("isLoggedIn");
 localStorage.removeItem("role");
 window.location.href = "login.html";
}</script>
</head>

<body class="bg-gray-100">

<div class="w-full md:w-64 h-screen md:h-screen bg-gray-900 text-white p-6 fixed md:fixed top-0 left-0 z-10">

<h2 class="text-2xl font-bold mb-8">Admin Panel</h2>

<ul class="space-y-4">

<li>
<a href="dashboard.html" class="hover:text-blue-400">Dashboard</a>
</li>

<li>
<a href="products.html" class="hover:text-blue-400">Products</a>
</li>

<li>
<a href="orders.html" class="hover:text-blue-400">Orders</a>
</li>

<li>
<a href="customers.html" class="hover:text-blue-400">Customers</a>
</li>

</ul>

</div>

<div class="ml-0 md:ml-64 p-4 md:p-10">

<h2 class="text-xl font-bold mb-4">Create Order</h2>

<div class="bg-white p-4 rounded shadow mb-6">

<div class="flex flex-col md:flex-row md:flex-wrap">
<select id="orderCustomer" class="border p-2 mb-2 md:mb-0 md:mr-2"></select>

<select id="orderProduct" class="border p-2 mb-2 md:mb-0 md:mr-2"></select>

<input type="number" id="orderQty" placeholder="Quantity" class="border p-2 mb-2 md:mb-0 md:mr-2">
</div>

<button onclick="createOrder()" class="bg-green-500 text-white px-4 py-2 rounded">
Create Order
</button>

</div>

<h1 class="text-3xl font-bold mb-6">Orders</h1>

<input
 id="searchOrder"
 placeholder="Search orders...by customer, product, status"
 class="border p-2 mb-4 w-full"
 onkeyup="searchOrders()">

<div class="overflow-x-auto">
<table class="w-full bg-white shadow rounded">

<thead class="bg-gray-200">

<tr>
<th class="p-3">Customer</th>
<th class="p-3">Product</th>
<th class="p-3">Quantity</th>
<th class="p-3">Total</th>
<th class="p-3">Date Occured</th>
<th class="p-3">Cancellation Date</th>
<th class="p-3">Status</th>

</tr>

</thead>

</div>
<tbody id="ordersTable"></tbody>

</table>

</div>
<div id="toast"
class="fixed top-5 right-5 hidden px-4 py-2 rounded shadow text-white"></div>
</body>
</html>
