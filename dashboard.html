<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="assets/js/data.js"></script>
<script src="assets/js/dashboard.js"></script>
<script>
if(localStorage.getItem("isLoggedIn") !== "true"){
 window.location.href = "login.html";
}
</script>
<script>function logout(){
 localStorage.removeItem("isLoggedIn");
 localStorage.removeItem("role");
 window.location.href = "login.html";
}</script>
</head>

<body class="bg-gray-100">

<div class="w-full md:w-64 h-screen md:h-screen bg-gray-900 text-white p-6 fixed md:fixed top-0 left-0 z-10">

<h2 class="text-2xl font-bold mb-8">Admin Panel</h2>

<ul class="space-y-4">

<li>
<a href="dashboard.html" class="hover:text-blue-400">Dashboard</a>
</li>

<li>
<a href="products.html" class="hover:text-blue-400">Products</a>
</li>

<li>
<a href="orders.html" class="hover:text-blue-400">Orders</a>
</li>

<li>
<a href="customers.html" class="hover:text-blue-400">Customers</a>
</li>

<button onclick="logout()"
class="mt-6 bg-red-500 text-white px-3 py-2 rounded w-full">
Logout
</button>

</ul>

</div>

<div class="ml-0 md:ml-64 p-4 md:p-10">

<h1 class="text-3xl font-bold mb-6">Dashboard</h1>

<input 
id="globalSearch"
type="text"
placeholder="Search products, customers, orders..."
class="w-full p-3 border rounded shadow mb-4"
onkeyup="globalSearch()">

<div id="searchResults" class="mb-6"></div>
    
    <div class="bg-white mt-10 p-6 rounded shadow">

<h2 class="text-xl font-bold mb-4">Low Inventory Alerts</h2>

<ul id="lowStockList"></ul>

</div>

<div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6">

<div class="bg-white p-6 rounded shadow">
<h3 class="text-gray-500">Total Products</h3>
<p id="totalProducts" class="text-2xl font-bold"></p>
</div>

<div class="bg-white p-6 rounded shadow">
<h3 class="text-gray-500">Orders</h3>
<p id="totalOrders" class="text-2xl font-bold"></p>
</div>

<div class="bg-white p-6 rounded shadow">
<h3 class="text-gray-500">Cancelled Orders</h3>
<p id="cancelledOrders" class="text-2xl font-bold"></p>
</div>

<div class="bg-white p-6 rounded shadow">
<h3 class="text-gray-500">Revenue</h3>
<p id="revenue" class="text-2xl font-bold"></p>
</div>

<div class="bg-white p-6 rounded shadow">
<h3 class="text-gray-500">Cancelled Revenue</h3>
<p id="cancelledRevenue" class="text-2xl font-bold"></p>
</div>

</div>

<div class="bg-white mt-10 p-6 rounded shadow">
<canvas id="salesChart"></canvas>
</div>

</div>

</body>
</html>
